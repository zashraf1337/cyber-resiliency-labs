<script>
(function(){
  var frame=document.getElementById('series-frame'),list=document.getElementById('series-list');
  if(!frame||!list)return;
  var eps=Array.prototype.slice.call(list.querySelectorAll('.ep'));
  function select(b,auto){
    eps.forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    frame.src='https://www.youtube.com/embed/'+b.getAttribute('data-id')+'?rel=0'+(auto?'&autoplay=1':'');
    frame.title='CR Labs: '+b.getAttribute('data-title');
  }
  list.addEventListener('click',function(e){
    var b=e.target.closest('.ep');if(!b)return;
    select(b,true);
    var n=eps.indexOf(b)+1;
    history.replaceState(null,'','#ep-'+n);
  });
  var m=(location.hash||'').match(/^#ep-(\d+)$/);
  if(m){var i=+m[1]-1;if(eps[i]&&i>0)select(eps[i],true);}
})();
</script>
