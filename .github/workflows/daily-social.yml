name: Daily social post

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC ≈ 10:00 America/Toronto (EDT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the next post without sending or advancing the cursor'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: daily-social
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: social
        run: npm install --no-audit --no-fund

      - name: Post next item
        working-directory: social
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: node post.mjs

      - name: Persist cursor
        if: ${{ always() }}
        run: |
          if ! git diff --quiet -- social/state.json; then
            git config user.name "cr-labs-bot"
            git config user.email "actions@users.noreply.github.com"
            git add social/state.json
            git commit -m "social: advance posting cursor [skip ci]"
            git push
          else
            echo "No cursor change to commit."
          fi
